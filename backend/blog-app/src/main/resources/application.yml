spring:
  application:
    name: dear-blog

  # ── Jackson 日期序列化 ─────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false   # LocalDateTime → ISO 字符串，而非数组

  # ── 数据源 ────────────────────────────────────────────────
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 生产环境通过环境变量覆盖，本地开发使用默认值
    url: ${BLOG_DB_URL:jdbc:mysql://localhost:3306/dear-blog?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${BLOG_DB_USER:root}
    password: ${BLOG_DB_PASS:123456}

  # ── Redis ─────────────────────────────────────────────────
  data:
    redis:
      host: ${BLOG_REDIS_HOST:localhost}
      port: ${BLOG_REDIS_PORT:6379}
      password: ${BLOG_REDIS_PASS:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 1
          max-wait: -1ms

  # ── Flyway 数据库迁移 ─────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    placeholder-replacement: false   # 禁用占位符替换，避免 SQL 中的 ${...} 被误解析

  # ── 文件上传大小限制 ──────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# ── 服务端口 ──────────────────────────────────────────────
server:
  port: ${BLOG_SERVER_PORT:8080}

# ── MyBatis Plus ──────────────────────────────────────────
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# ── 日志 ──────────────────────────────────────────────────
logging:
  level:
    com.dearblog.mapper: debug   # 开发时打印 SQL，生产可改为 info
    com.dearblog: info

# ── SpringDoc / Swagger ───────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

# ── 自定义业务配置 ─────────────────────────────────────────
blog:
  jwt:
    # 生产环境必须通过 BLOG_JWT_SECRET 设置强密钥（至少 32 位）
    secret: ${BLOG_JWT_SECRET:dear-blog-default-secret-key-change-in-production}
    # Token 有效期（单位：秒）
    expiration: ${BLOG_JWT_EXPIRATION:86400}   # 默认 24 小时

  upload:
    # 文件存储的本地绝对路径，生产环境通过 BLOG_UPLOAD_PATH 环境变量配置
    path: ${BLOG_UPLOAD_PATH:./uploads}
    # 客户端访问文件的 URL 前缀（与 WebMvcConfig 资源映射对应）
    access-prefix: /uploads
