<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>系列 — dear·blog</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>

<nav class="site-nav">
  <div class="container">
    <a href="index.html" class="site-title">
      <span class="site-logo">
        <span class="site-logo-text">DEAR</span><sup class="site-logo-sup">th</sup>
      </span>
    </a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">文章</a></li>
      <li><a href="categories.html">分类</a></li>
      <li><a href="tags.html">标签</a></li>
      <li><a href="archives.html">归档</a></li>
      <li><a href="series.html" class="active">系列</a></li>
      <li><a href="about.html">关于</a></li>
    </ul>
    <div class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></div>
  </div>
</nav>

<div class="page-body">
  <div class="container--narrow">

    <div class="page-hd">
      <span class="page-hd-eyebrow">// Series</span>
      <h1 class="page-hd-title">系列文章</h1>
      <p class="page-hd-sub">成体系的内容，按主题连续阅读效果更佳</p>
    </div>

    <div class="series-grid" id="series-grid"></div>

  </div>
</div>

<footer class="site-footer">
  <div class="container">
    <p class="footer-left">© <span id="footer-year"></span> dear·blog</p>
    <div class="footer-links">
      <a href="index.html">← 返回首页</a>
    </div>
  </div>
</footer>

<script src="assets/data.js"></script>
<script>
  document.getElementById('footer-year').textContent = new Date().getFullYear();

  document.getElementById('series-grid').innerHTML = SERIES.map(s => `
    <div class="series-card">
      <div class="series-card-hd">
        <h2 class="series-name">${s.name}</h2>
        <span class="series-badge">${s.articleCount} 篇</span>
      </div>
      <p class="series-desc">${s.desc}</p>
      <ul class="series-articles-list">
        ${s.articles.map((a, i) => `
          <li class="series-article-row">
            <span class="sar-num">${String(i + 1).padStart(2, '0')}</span>
            <a class="sar-title" href="article.html?slug=${a.slug || ARTICLES.find(art => art.title === a.title)?.slug || '#'}">${a.title}</a>
            <span class="sar-date">${formatDate(a.date)}</span>
          </li>
        `).join('')}
      </ul>
    </div>
  `).join('');

  document.getElementById('nav-toggle').addEventListener('click', () => {
    document.getElementById('nav-links').classList.toggle('open');
  });
</script>
</body>
</html>
