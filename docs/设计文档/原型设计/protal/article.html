<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章详情 — dear·blog</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>

<nav class="site-nav">
  <div class="container">
    <a href="index.html" class="site-title">
      <span class="site-logo">
        <span class="site-logo-text">DEAR</span><sup class="site-logo-sup">th</sup>
      </span>
    </a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">文章</a></li>
      <li><a href="categories.html">分类</a></li>
      <li><a href="tags.html">标签</a></li>
      <li><a href="archives.html">归档</a></li>
      <li><a href="series.html">系列</a></li>
      <li><a href="about.html">关于</a></li>
    </ul>
    <div class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></div>
  </div>
</nav>

<div class="page-body">
  <div class="container">
    <div class="article-page" id="article-page">
      <!-- Main Content -->
      <main>
        <!-- Breadcrumb -->
        <div style="padding: 28px 0 0; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; color: var(--text-3);">
          <a href="index.html" style="color: var(--text-3); text-decoration: none; transition: color 0.2s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-3)'">HOME</a>
          <span style="margin: 0 10px; opacity: 0.4;">/</span>
          <a href="categories.html" id="bread-cat" style="color: var(--text-3); text-decoration: none; transition: color 0.2s; text-transform: uppercase; letter-spacing: 0.06em;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-3)'"></a>
          <span style="margin: 0 10px; opacity: 0.4;">/</span>
          <span id="bread-title" style="color: var(--text-2);"></span>
        </div>

        <!-- Article Header -->
        <header class="article-header" id="article-header"></header>

        <!-- Article Body -->
        <article class="article-body" id="article-body"></article>

        <!-- Tags Footer -->
        <div id="article-tags-footer" style="margin-top: 40px; padding-top: 28px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 8px;"></div>

        <!-- Prev / Next -->
        <nav class="article-nav" id="article-nav"></nav>
      </main>

      <!-- TOC Sidebar -->
      <aside class="article-sidebar" id="article-sidebar">
        <div class="toc" id="toc">
          <p class="toc-label">目录</p>
          <ul class="toc-list" id="toc-list"></ul>
        </div>
        <!-- Reading Progress -->
        <div style="margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border);">
          <p class="toc-label">阅读进度</p>
          <div style="height: 3px; background: var(--border); border-radius: 2px; overflow: hidden;">
            <div id="progress-bar" style="height: 100%; background: var(--accent); width: 0%; transition: width 0.1s;"></div>
          </div>
        </div>
      </aside>
    </div>
  </div>
</div>

<footer class="site-footer">
  <div class="container">
    <p class="footer-left">© <span id="footer-year"></span> dear·blog · 用心记录</p>
    <div class="footer-links">
      <a href="index.html">← 返回首页</a>
      <a href="archives.html">所有文章</a>
    </div>
  </div>
</footer>

<script src="assets/data.js"></script>
<script>
  document.getElementById('footer-year').textContent = new Date().getFullYear();

  /* ── Get article from URL param ── */
  const params = new URLSearchParams(location.search);
  const slug = params.get('slug') || ARTICLES[0].slug;
  const article = ARTICLES.find(a => a.slug === slug) || ARTICLES[0];
  const idx = ARTICLES.findIndex(a => a.slug === article.slug);

  /* ── Page title ── */
  document.title = article.title + ' — dear·blog';

  /* ── Breadcrumb ── */
  document.getElementById('bread-cat').textContent = article.category;
  document.getElementById('bread-cat').href = `categories.html?slug=${article.categorySlug}`;
  document.getElementById('bread-title').textContent = article.title.length > 20 ? article.title.slice(0, 20) + '…' : article.title;

  /* ── Article Header ── */
  document.getElementById('article-header').innerHTML = `
    <span class="a-cat">${article.category}</span>
    <h1>${article.title}</h1>
    <div class="article-hd-meta">
      <span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        ${formatDate(article.date)}
      </span>
      <span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        预计阅读 ${article.readingTime} 分钟
      </span>
      <span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        约 ${article.readingTime * 300} 字
      </span>
    </div>
  `;

  /* ── Article Body ── */
  // For the demo, use detailed content for article[0], otherwise generic
  let bodyHtml = article.content;

  // Ensure article[0] (first article) has rich content for TOC demo
  if (article.id === 1) {
    bodyHtml = `
      <p>在这个信息过剩的时代，公众号、知乎、掘金……随便拿一个平台都能发文章。那我为什么还要折腾自己搭一个博客呢？</p>
      <p>答案其实很简单：我想要一个真正属于自己的地方。</p>

      <h2 id="why-own-blog">为什么要自建博客</h2>
      <p>简单说三点：<strong>数据主权、设计自由度</strong>，以及一种隐约的仪式感。</p>
      <blockquote>「你的内容，应该在你的服务器上。」</blockquote>

      <h3 id="data-ownership">数据主权</h3>
      <p>把内容托管在第三方平台，本质上是在把自己的思考寄存在别人的服务器里。平台改规则、倒闭、封号……这些风险都是真实存在的。自建博客，数据在自己手里，想迁移就迁移，想备份就备份。</p>

      <h3 id="design-freedom">设计自由度</h3>
      <p>我对排版和阅读体验有些执念。主流平台的编辑器和展示样式很难深度定制，顶多换个皮肤。而自建博客可以把每一个细节——字体、间距、配色、交互——调到自己满意为止。</p>
      <p>这个博客你现在看到的样子，就是我心目中理想的阅读体验：极简、克制、专注于内容本身。</p>

      <h3 id="ritual">仪式感</h3>
      <p>在自己搭建的地方写东西，感觉就是不一样。有点像在自己家里写日记，和在朋友圈发状态，是完全不同的心态。这种仪式感让我更愿意认真对待每一篇文章。</p>

      <h2 id="vitepress-choice">为什么选 VitePress</h2>
      <p>对比了市面上主流的静态站点生成器：Hexo、Hugo、Gatsby、Astro 和 VitePress，最终选择了 VitePress。</p>

      <h3 id="comparison">方案对比</h3>
      <p>Hexo 生态丰富但速度慢；Hugo 极快但用 Go 模板语言，二次开发门槛高；Gatsby 功能强大但配置繁琐；Astro 很好但我更熟悉 Vue 生态。</p>
      <p>VitePress 的优势：</p>
      <ul>
        <li>Vue 官方出品，与 Vue 3 + TypeScript 无缝集成</li>
        <li>基于 Vite，构建速度极快，开发体验极佳</li>
        <li>内置 Markdown 渲染，支持代码高亮、数学公式等</li>
        <li>支持在 Markdown 中直接使用 Vue 组件</li>
        <li>SSG 产物是纯静态 HTML，部署简单</li>
      </ul>

      <h3 id="ssg-advantage">SSG 的优势</h3>
      <p>博客内容变更频率低，非常适合静态预渲染（SSG）。构建一次，所有页面都是静态 HTML：</p>
      <pre><code># 构建命令
vitepress build

# 产物是纯静态文件
dist/
├── index.html
├── posts/
│   ├── my-first-post.html
│   └── ...
└── assets/</code></pre>
      <p>部署只需要一个 Nginx，把 dist 目录指向静态文件即可。不需要 Node.js 运行时，不需要数据库，维护成本极低。</p>

      <h2 id="architecture">整体架构设计</h2>
      <p>虽然是个人博客，我还是认真做了架构设计。毕竟这也是一个练手项目，要做就做完整。</p>
      <p>整体分为三层：</p>
      <ol>
        <li><strong>Portal 门户</strong>：VitePress 构建的静态站点，面向读者</li>
        <li><strong>Admin 后台</strong>：Vue 3 + Vite 的 CSR 应用，面向博主</li>
        <li><strong>Backend API</strong>：Spring Boot 3 提供 RESTful API</li>
      </ol>
      <p>Portal 通过 SSG 在构建时从 API 拉取数据生成静态页面，Admin 通过 API 实时读写数据。这样的分层让前后端完全解耦。</p>

      <h2 id="deploy">部署方案</h2>
      <p>所有服务都容器化，通过 Docker Compose 编排：</p>
      <ul>
        <li>Nginx 容器：托管 Portal 静态文件、Admin 静态文件，反向代理 API</li>
        <li>Spring Boot 容器：提供后端 API</li>
        <li>MySQL 容器：主数据库</li>
        <li>Redis 容器：缓存和 Token 黑名单</li>
      </ul>
      <p>一条命令 <code>docker-compose up -d</code> 即可启动整套服务。</p>

      <h2 id="summary">总结</h2>
      <p>技术选型没有绝对正确答案，适合自己的才是最好的。VitePress 对我来说，在开发体验、性能和可维护性之间找到了很好的平衡点。</p>
      <p>后续会继续写这个系列，记录数据库设计、前端工程化配置、后端 API 开发到最终上线部署的全过程。欢迎关注。</p>
    `;
  }

  document.getElementById('article-body').innerHTML = bodyHtml;

  /* ── Tags Footer ── */
  document.getElementById('article-tags-footer').innerHTML = article.tags.map(t => `
    <a href="tags.html?tag=${encodeURIComponent(t)}" class="tag-pill" style="font-size: 12px; padding: 4px 12px;"># ${t}</a>
  `).join('');

  /* ── Prev / Next Navigation ── */
  const prev = idx > 0 ? ARTICLES[idx - 1] : null;
  const next = idx < ARTICLES.length - 1 ? ARTICLES[idx + 1] : null;
  document.getElementById('article-nav').innerHTML = `
    ${prev ? `<a class="article-nav-btn" href="article.html?slug=${prev.slug}">
      <div class="anb-dir">← 上一篇</div>
      <div class="anb-title">${prev.title}</div>
    </a>` : '<div></div>'}
    ${next ? `<a class="article-nav-btn article-nav-btn--next" href="article.html?slug=${next.slug}">
      <div class="anb-dir">下一篇 →</div>
      <div class="anb-title">${next.title}</div>
    </a>` : '<div></div>'}
  `;

  /* ── Generate TOC ── */
  const articleBody = document.getElementById('article-body');
  const headings = articleBody.querySelectorAll('h2, h3');
  const tocList = document.getElementById('toc-list');

  if (headings.length === 0) {
    document.getElementById('toc').style.display = 'none';
  } else {
    headings.forEach((h, i) => {
      if (!h.id) h.id = 'heading-' + i;
      const li = document.createElement('li');
      li.className = 'toc-item' + (h.tagName === 'H3' ? ' toc-item--h3' : '');
      li.innerHTML = `<a class="toc-link" href="#${h.id}">${h.textContent}</a>`;
      tocList.appendChild(li);
    });

    /* ── TOC Scroll Spy ── */
    const tocLinks = tocList.querySelectorAll('.toc-link');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          tocLinks.forEach(l => l.classList.remove('active'));
          const active = tocList.querySelector(`a[href="#${entry.target.id}"]`);
          if (active) active.classList.add('active');
        }
      });
    }, { rootMargin: '-60px 0px -70% 0px' });

    headings.forEach(h => observer.observe(h));
  }

  /* ── Reading Progress Bar ── */
  window.addEventListener('scroll', () => {
    const body = document.getElementById('article-body');
    const rect = body.getBoundingClientRect();
    const total = body.offsetHeight;
    const scrolled = -rect.top;
    const pct = Math.min(100, Math.max(0, (scrolled / total) * 100));
    document.getElementById('progress-bar').style.width = pct + '%';
  });

  /* ── Mobile Nav ── */
  document.getElementById('nav-toggle').addEventListener('click', () => {
    document.getElementById('nav-links').classList.toggle('open');
  });
</script>
</body>
</html>
