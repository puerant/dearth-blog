# Host Nginx site config for dear-blog
# Suggested path: /etc/nginx/conf.d/blog.dearth.cn.conf

server {
    listen 80;
    server_name blog.dearth.cn;

    # Portal static files (VitePress build output)
    # Example: /var/www/dear-blog/portal -> contains index.html
    root /var/www/dear-blog/portal;
    index index.html;

    client_max_body_size 20M;

    # Backend API
    location /api/ {
        proxy_pass         http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Uploaded files (proxy to backend to avoid host path coupling)
    location /uploads/ {
        proxy_pass         http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Admin SPA (built assets)
    # Example: /var/www/dear-blog/admin -> contains admin/index.html
    location = /admin {
        return 301 /admin/;
    }

    location ^~ /admin/ {
        alias /var/www/dear-blog/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # VitePress dynamic article fallback (__init__ page)
    location /articles/ {
        try_files $uri $uri/ /articles/__init__/index.html;
    }

    # Portal fallback
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
}
