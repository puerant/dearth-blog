services:
  mysql:
    image: mysql:8.0
    container_name: dear-blog-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: dear-blog
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: dear-blog-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE}
    pull_policy: always
    container_name: dear-blog-backend
    restart: unless-stopped
    environment:
      BLOG_DB_URL: jdbc:mysql://mysql:3306/dear-blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      BLOG_DB_USER: root
      BLOG_DB_PASS: ${DB_PASS}
      BLOG_REDIS_HOST: redis
      BLOG_REDIS_PORT: 6379
      BLOG_REDIS_PASS: ${REDIS_PASS}
      BLOG_JWT_SECRET: ${JWT_SECRET}
      BLOG_UPLOAD_PATH: /app/uploads
    ports:
      - "127.0.0.1:${BACKEND_PORT:-18080}:8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  uploads:
